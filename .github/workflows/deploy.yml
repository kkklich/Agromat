name: Build and Deploy Angular App to Cyberfolks

on:
  push:
    branches:
      - main 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # This tells GitHub to run all 'run' steps inside your subfolder
    defaults:
      run:
        working-directory: sami-swoi-app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      # Ensure you have committed the package-lock.json inside the sami-swoi-app folder!
      run: npm ci 

    - name: Build Angular Project
      run: npm run build -- --configuration production --base-href /samiswoi/

    - name: Deploy to Cyberfolks via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        
        # Note the path starts with the subfolder name
        local-dir: ./sami-swoi-app/dist/sami-swoi-app/browser/ 
        
        # Your target path on the server
        server-dir: /home/sites/krzysztofklich.pl/public_html/samiswoi/