<section class="contact-section">
    <h2>Skontaktuj się z nami</h2>
    <p>Masz pytania dotyczące automatów? Napisz do nas, a rozwiejemy Twoje wątpliwości!!!</p>

    <div class="contact-container">
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
            <div class="form-group">
                <label for="name">Imię i nazwisko</label>
                <input type="text" id="name" name="name" [(ngModel)]="formData.name" required
                    placeholder="Jan Kowalski">
            </div>

            <div class="form-group">
                <label for="email">Adres e-mail</label>
                <input type="email" id="email" name="email" [(ngModel)]="formData.email" required
                    placeholder="jan@przyklad.pl">
            </div>

            <div class="form-group">
                <label for="message">Wiadomość</label>
                <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="5"
                    placeholder="W czym możemy pomóc?"></textarea>
            </div>
            <button type="submit" [disabled]="!contactForm.form.valid" class="submit-button">Wyślij wiadomość</button>
        </form>
    </div>
</section>
